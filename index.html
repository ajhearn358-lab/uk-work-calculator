<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Work Entitlement Calculator</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
}
.tabs {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}
button {
    flex: 1;
    padding: 10px;
    margin: 3px;
    border: none;
    border-radius: 8px;
    background: #e0e0e0;
    cursor: pointer;
}
button.active {
    background: #000;
    color: white;
}
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}
.calculate-btn {
    background: black;
    color: white;
}
.result {
    margin-top: 15px;
    font-weight: bold;
}
.paywall {
    margin-top: 15px;
    padding: 15px;
    background: #fff3cd;
    border-radius: 8px;
}
.unlock-btn {
    margin-top: 10px;
    background: green;
    color: white;
}
</style>
</head>
<body>

<div class="container">
<h1>UK Work Entitlement Calculator</h1>

<div class="tabs">
<button onclick="showTab('holiday')" class="active" id="holidayTab">Holiday</button>
<button onclick="showTab('redundancy')" id="redundancyTab">Redundancy</button>
<button onclick="showTab('notice')" id="noticeTab">Notice</button>
</div>

<div id="holiday">
<label>Days worked per week:</label>
<input type="number" id="daysPerWeek">
<button class="calculate-btn" onclick="calculateHoliday()">Calculate</button>
<div class="result" id="holidayResult"></div>
</div>

<div id="redundancy" style="display:none;">
<label>Age:</label>
<input type="number" id="age">
<label>Years of service:</label>
<input type="number" id="years">
<label>Weekly pay (£):</label>
<input type="number" id="weeklyPay">
<button class="calculate-btn" onclick="calculateRedundancy()">Calculate</button>
<div class="result" id="redundancyResult"></div>
</div>

<div id="notice" style="display:none;">
<label>Years worked:</label>
<input type="number" id="noticeYears">
<button class="calculate-btn" onclick="calculateNotice()">Calculate</button>
<div class="result" id="noticeResult"></div>
</div>

<div class="paywall" id="paywall" style="display:none;">
Full breakdown unlocked for £1.99 (Stripe integration coming next).
<button class="unlock-btn">Unlock</button>
</div>

</div>

<script>
function showTab(tab) {
    document.getElementById('holiday').style.display = 'none';
    document.getElementById('redundancy').style.display = 'none';
    document.getElementById('notice').style.display = 'none';
    document.getElementById(tab).style.display = 'block';

    document.getElementById('holidayTab').classList.remove('active');
    document.getElementById('redundancyTab').classList.remove('active');
    document.getElementById('noticeTab').classList.remove('active');
    document.getElementById(tab + 'Tab').classList.add('active');
}

function calculateHoliday() {
    let days = document.getElementById('daysPerWeek').value;
    let entitlement = (days * 5.6).toFixed(1);
    document.getElementById('holidayResult').innerText =
        "Estimated statutory entitlement: " + entitlement + " days per year (preview)";
    document.getElementById('paywall').style.display = 'block';
}

function calculateRedundancy() {
    let age = document.getElementById('age').value;
    let years = document.getElementById('years').value;
    let weekly = document.getElementById('weeklyPay').value;
    let cap = 700;
    if (weekly > cap) weekly = cap;
    let result = (years * weekly).toFixed(2);
    document.getElementById('redundancyResult').innerText =
        "Estimated redundancy pay: £" + result + " (preview)";
    document.getElementById('paywall').style.display = 'block';
}

function calculateNotice() {
    let years = document.getElementById('noticeYears').value;
    let notice = years < 12 ? years : 12;
    document.getElementById('noticeResult').innerText =
        "Statutory notice: " + notice + " weeks (preview)";
    document.getElementById('paywall').style.display = 'block';
}
</script>

</body>
</html>
