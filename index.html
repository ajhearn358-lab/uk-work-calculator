<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Work Entitlement Calculator</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
}

.disclaimer {
    background: #f0f0f0;
    padding: 15px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.primary {
    background: black;
    color: white;
}

.unlock {
    background: #6c47ff;
    color: white;
    margin-top: 15px;
    width: 100%;
}

.result {
    margin-top: 15px;
    font-weight: bold;
}

footer {
    text-align: center;
    font-size: 12px;
    margin-top: 25px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
<h1>UK Work Entitlement Calculator</h1>

<div class="disclaimer">
<strong>Important:</strong> This calculator provides general guidance based on UK statutory rules. It is not legal advice. Results are estimates only and may not reflect your contractual terms.
</div>

<h3>Redundancy Calculator</h3>

<label>Age</label>
<input type="number" id="age">

<label>Years of service</label>
<input type="number" id="years">

<label>Weekly pay (£)</label>
<input type="number" id="weekly">

<button class="primary" onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<button class="unlock" onclick="unlock()">Unlock Full Breakdown – £2.99</button>

</div>

<footer>
© 2026 UK Work Entitlement Calculator. Informational tool only.
</footer>

<script>
function calculate() {

let age = parseInt(document.getElementById("age").value);
let years = parseInt(document.getElementById("years").value);
let weekly = parseFloat(document.getElementById("weekly").value);

if (!age || !years || !weekly) return;

const weeklyCap = 700;
if (weekly > weeklyCap) weekly = weeklyCap;
if (years > 20) years = 20;

let totalWeeks = 0;

for (let i = 0; i < years; i++) {
    let yearAge = age - i;

    if (yearAge < 22) {
        totalWeeks += 0.5;
    } else if (yearAge <= 40) {
        totalWeeks += 1;
    } else {
        totalWeeks += 1.5;
    }
}

let redundancyPay = (totalWeeks * weekly).toFixed(2);

document.getElementById("result").innerHTML =
"Estimated statutory redundancy pay: £" + redundancyPay +
"<br><small>Full breakdown available after purchase.</small>";
}

function unlock() {
window.location.href = "https://buy.stripe.com/test_4gM9AVeyPgzn4Mf6SLf3a00";
}
</script>

</body>
</html>
